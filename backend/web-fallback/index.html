<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CS2 Nade Guide — Shared Lineup</title>
<style>
  body { margin: 0; background: #0B0C0E; color: #F2F4F7;
         font-family: -apple-system, "SF Pro Text", system-ui, sans-serif;
         display: grid; place-items: center; min-height: 100vh; }
  .card { text-align: center; padding: 32px; max-width: 360px; }
  .mark { width: 72px; height: 72px; border: 1px solid #2A2E36; border-radius: 18px;
          background: #16181C; display: grid; place-items: center; margin: 0 auto 16px; }
  h1 { font-size: 22px; margin: 0 0 8px; }
  p { color: #9AA1AC; font-size: 14px; line-height: 1.55; margin: 0 0 20px; }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 11px;
          color: #5C636E; letter-spacing: 1px; text-transform: uppercase; }
  a.btn { display: inline-block; background: #FF7A1A; color: #0B0C0E; font-weight: 600;
          font-size: 15px; padding: 12px 22px; border-radius: 10px; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <div class="mark">
      <svg width="40" height="40" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
        <g stroke="#3A3F49" stroke-width="4"><line x1="10" y1="92" x2="110" y2="92"/></g>
        <line x1="79" y1="92" x2="79" y2="76" stroke="#FF7A1A" stroke-width="6"/>
        <g transform="translate(74,36) rotate(64)" fill="#FF7A1A">
          <rect x="-11" y="-16" width="22" height="33" rx="3"/>
          <rect x="-6" y="-23" width="12" height="7" rx="1.5"/>
        </g>
      </svg>
    </div>
    <p class="mono">Shared with you</p>
    <h1>A CS2 lineup was shared with you</h1>
    <p>Open this link on an iPhone with CS2 Nade Guide installed to save the
       throw to your library.</p>
    <a class="btn" href="https://apps.apple.com/">Get the app</a>
  </div>
</body>
</html>
